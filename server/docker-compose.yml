services:
  web:
    profiles: ["full"]
    build:
      context: ..
      dockerfile: Dockerfile
    restart: always
    stop_signal: SIGINT
    stop_grace_period: 2s
    ports:
      - "8080:3000"
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      - GAME_DATA_DIR=/app/server/assets/games/
      - DATABASE_URL=postgresql://nhie:${DB_PASSWORD}@db:5432/nhie
      - AXIOM_TOKEN=${AXIOM_TOKEN}
      - AXIOM_ORG_ID=${AXIOM_ORG_ID}
    volumes:
      - gamedata:/app/server/assets/games/

  db:
    image: postgres:18-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: nhie
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: nhie
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nhie -d nhie"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  gamedata:
