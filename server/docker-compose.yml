services:
  web:
    build:
      context: ..
      dockerfile: server/Dockerfile
    restart: always
    stop_signal: SIGINT
    stop_grace_period: 2s
    ports:
      - "8080:3000"
    environment:
      - GAME_DATA_DIR=/home/bun/app/assets/games/
      - AXIOM_TOKEN=${AXIOM_TOKEN}
      - AXIOM_ORG_ID=${AXIOM_ORG_ID}
      - VALKEY_URI=valkey://:${VALKEY_PASSWORD}@cache:6379

    volumes:
      - /var/gamedata:/home/bun/app/assets/games/
  cache:
    image: valkey/valkey:latest
    restart: always
    command: ["valkey-server", "--requirepass", "${VALKEY_PASSWORD}", "--bind", "0.0.0.0"]
    volumes:
      - /var/dockerdata:/data
